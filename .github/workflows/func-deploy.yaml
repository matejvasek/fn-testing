name: Func Deploy
"on":
  push:
    branches:
      - devel
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Kubernetes context
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBECONFIG }}
          method: kubeconfig
      - name: Deploy function
        run: func deploy --registry=${{ vars.REGISTRY_URL }} -v
